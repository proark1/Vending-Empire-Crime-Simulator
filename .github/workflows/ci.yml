name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Cancel superseded runs for the same PR; main runs always finish.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    name: Typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Fail the build on high/critical vulnerabilities in shipped (production)
      # dependencies. Dev-only tooling advisories are excluded so the gate stays
      # focused on the actual runtime attack surface.
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Check performance budgets
        run: npm run check:perf

      - name: Smoke production server
        run: npm run smoke:server

      - name: Install browser runtime
        run: npx playwright install --with-deps chromium

      - name: Smoke browser runtime
        run: npm run smoke:browser

name: Deploy

# Manual-only: trigger from the Actions tab (or `gh workflow run deploy.yml`).
# Kept separate from CI so production deploys are an explicit, deliberate action
# and never double-fire alongside Railway's native GitHub auto-deploy.
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Railway
    if: github.repository == 'proark1/Vending-Empire-Crime-Simulator'
    runs-on: ubuntu-latest
    steps:
      - name: Check for Railway token
        id: guard
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::warning::RAILWAY_TOKEN secret is not set — skipping deploy. Add it under Settings → Secrets and variables → Actions (token from Railway → project → Settings → Tokens)."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.guard.outputs.ready == 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: steps.guard.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.guard.outputs.ready == 'true'
        run: npm ci

      - name: Build (pre-deploy sanity check)
        if: steps.guard.outputs.ready == 'true'
        run: npm run build

      - name: Install Railway CLI
        if: steps.guard.outputs.ready == 'true'
        run: npm i -g @railway/cli

      - name: Deploy
        if: steps.guard.outputs.ready == 'true'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          # Optional: set repo variable RAILWAY_SERVICE if the token is not
          # already scoped to a single service.
          RAILWAY_SERVICE: ${{ vars.RAILWAY_SERVICE }}
        run: |
          if [ -n "$RAILWAY_SERVICE" ]; then
            railway up --ci --service "$RAILWAY_SERVICE"
          else
            railway up --ci
          fi
